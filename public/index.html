<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software Update</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<div class="update-card">
<div class="icon">⚠️</div>
<h1>Critical Security Update</h1>
<p>Your Windows system requires an immediate security patch to protect against recent vulnerabilities.</p>
<div class="system-info">
<p>Windows Version: Windows 10/11 Detected</p>
<p>Last Update: Failed</p>
<p>Risk Level: High</p>
</div>
<button id="downloadBtn" class="download-btn">Download Update (32.4 MB)</button>
<p class="note">This update will automatically install after download.</p>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
